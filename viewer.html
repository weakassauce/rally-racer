<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GLB Viewer</title>
    <style>
      html, body { margin: 0; height: 100%; background: #1a1f1a; color: #ddd; font-family: ui-monospace, Menlo, Consolas, monospace; }
      #app { position: fixed; inset: 0; }
      #ui { position: fixed; left: 12px; top: 12px; padding: 8px 12px; background: rgba(0,0,0,0.55); border: 1px solid #333; border-radius: 4px; font-size: 12px; }
      #ui a { color: #9fffa6; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui">
      <div>file: <span id="filename"></span></div>
      <div>drag to orbit · scroll to zoom · right-drag to pan</div>
      <div>switch:
        <a href="?file=/assets/player_car.glb">car</a> ·
        <a href="?file=/assets/wheel.glb">wheel</a> ·
        <a href="?file=/assets/tree.glb">tree</a> ·
        <a href="?file=/assets/rock.glb">rock</a>
      </div>
    </div>
    <script type="module">
      import * as THREE from 'three';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      const params = new URLSearchParams(location.search);
      const file = params.get('file') || '/assets/player_car.glb';
      document.getElementById('filename').textContent = file;
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.1;
      document.getElementById('app').appendChild(renderer.domElement);
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1d2228);
      scene.add(new THREE.GridHelper(20, 20, 0x444444, 0x2a2a2a));
      scene.add(new THREE.HemisphereLight(0xffffff, 0x202020, 0.8));
      const sun = new THREE.DirectionalLight(0xffffff, 1.4);
      sun.position.set(5, 8, 4); scene.add(sun);
      const fill = new THREE.DirectionalLight(0x88aaff, 0.5);
      fill.position.set(-5, 3, -4); scene.add(fill);
      const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 1000);
      camera.position.set(2.5, 1.8, 3.5);
      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0.5, 0);
      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      });
      new GLTFLoader().load(file, (g) => {
        const root = g.scene;
        const box = new THREE.Box3().setFromObject(root);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        root.position.sub(center);
        const maxAxis = Math.max(size.x, size.y, size.z) || 1;
        const targetSize = 4;
        root.scale.setScalar(targetSize / maxAxis);
        scene.add(root);
        camera.position.set(targetSize * 1.1, targetSize * 0.7, targetSize * 1.4);
        controls.target.set(0, 0, 0);
      }, undefined, (err) => {
        console.error(err);
        document.getElementById('filename').textContent = 'ERROR: ' + file;
      });
      function tick() { controls.update(); renderer.render(scene, camera); requestAnimationFrame(tick); }
      tick();
    </script>
  </body>
</html>
