<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rally Stage</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0e10; color: #d8e2c4; font-family: ui-monospace, Menlo, Consolas, monospace; }
      #app { position: fixed; inset: 0; }
      #hud { position: fixed; inset: 0; pointer-events: none; }
      #hud canvas { width: 100%; height: 100%; display: block; }
      #help {
        position: fixed; left: 14px; bottom: 14px; padding: 8px 12px;
        background: rgba(10,18,12,0.65); border: 1px solid #4a5a30; border-radius: 6px;
        font-size: 12px; line-height: 1.5; color: #d8e2c4;
      }
      #help b { color: #ffffff; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"><canvas></canvas></div>
    <div id="help">
      <div><b>W/↑</b> throttle &nbsp; <b>S/↓</b> brake/reverse &nbsp; <b>A/D</b> or <b>←/→</b> steer</div>
      <div><b>Space</b> handbrake &nbsp; <b>R</b> reset &nbsp; <b>V</b> view &nbsp; <b>Right-mouse drag</b> look</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
